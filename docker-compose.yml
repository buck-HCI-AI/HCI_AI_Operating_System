version: "3.8"

# HCI AI Operating System — Full Stack
# Start: docker-compose up -d
# n8n is already running standalone; migrate it here when ready.

services:

  # ── n8n — Workflow Automation ─────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Denver
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Workflows reference these via $env.HUBSPOT_API_KEY / $env.ANTHROPIC_API_KEY -
      # found 2026-07-06 the n8n container never had them set, so every workflow
      # using them got a MALFORMED_TOKEN auth failure on every single run.
      - HUBSPOT_API_KEY=${HUBSPOT_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # WAL mode does far fewer fsync/lock operations than the default rollback
      # journal — mitigates the recurring SQLITE_IOERR seen with SQLite over a
      # host bind-mount on Docker Desktop for macOS (~/.n8n below is a bind
      # mount, not a native Docker volume, which is the documented root cause).
      - DB_SQLITE_ENABLE_WAL=true
    volumes:
      # Migrated 2026-07-07: was a host bind-mount (~/.n8n), the documented
      # root cause of recurring SQLITE_IOERR (WAL mode alone didn't stop it
      # recurring). Native Docker volumes go through Docker Desktop's normal
      # block storage instead of macOS's gRPC-FUSE/VirtioFS file-sharing path.
      # Original ~/.n8n left on disk untouched as a fallback copy.
      - n8n_data:/home/node/.n8n
    networks:
      - hci_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── PostgreSQL — Truth Store ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hci_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hci_os
      POSTGRES_USER: hci_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./05_Database/postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    networks:
      - hci_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hci_admin -d hci_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — Memory / Vector Store ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hci_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hci_network
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo >/dev/tcp/localhost/6333) 2>/dev/null && exit 0 || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis — Temporary State / Cache ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hci_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hci_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  n8n_data:
    name: n8n_data

networks:
  hci_network:
    driver: bridge
