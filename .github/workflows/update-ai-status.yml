name: Update AI Status

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 6AM MDT (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-status:
    name: Regenerate AI Team Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status timestamp
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|\*\*Last Updated:\*\*.*|**Last Updated:** ${NOW} (CI)|" AI_TEAM/00_STATUS.md
          echo "Updated AI_TEAM/00_STATUS.md to ${NOW}"

      - name: Commit status update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AI_TEAM/00_STATUS.md
          git diff --staged --quiet || git commit -m "ci: auto-update AI_TEAM status timestamp [skip ci]"
          git push
