name: Update AI Status

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 6AM MDT (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-status:
    name: Regenerate AI Team Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate status file
        run: |
          # In CI, skip live service checks — just update timestamps
          python -c "
import os
from datetime import datetime, timezone
now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
path = 'AI_TEAM/00_STATUS.md'
with open(path) as f:
    content = f.read()
# Update the 'Last updated' line
import re
content = re.sub(r'Last updated:.*', f'Last updated: {now} (CI)', content)
with open(path, 'w') as f:
    f.write(content)
print(f'Updated timestamp in {path}')
"

      - name: Commit status update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AI_TEAM/00_STATUS.md
          git diff --staged --quiet || git commit -m "ci: auto-update AI_TEAM status timestamp [skip ci]"
          git push
