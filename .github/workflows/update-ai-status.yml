name: Update AI Status

on:
  workflow_dispatch:

# Requires repo Settings → Actions → General → Workflow permissions = "Read and write"
# to enable auto-push. Until then, run manually via GitHub Actions tab when needed.

jobs:
  update-status:
    name: Regenerate AI Team Status
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status timestamp
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|\*\*Last Updated:\*\*.*|**Last Updated:** ${NOW} (CI)|" AI_TEAM/00_STATUS.md
          echo "Updated AI_TEAM/00_STATUS.md to ${NOW}"

      - name: Commit status update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AI_TEAM/00_STATUS.md
          git diff --staged --quiet || git commit -m "ci: auto-update AI_TEAM status timestamp [skip ci]"
          git push
