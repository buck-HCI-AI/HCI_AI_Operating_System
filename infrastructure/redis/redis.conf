# HCI Redis Configuration
# Applied via docker-compose command args — this file documents settings
# and is used when migrating to a file-based Redis config.

# Security — password set via REDIS_PASSWORD env var in compose
# requirepass set via --requirepass CLI arg

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 60 1
appendonly yes
appendfilename "appendonly.aof"

# Performance
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
